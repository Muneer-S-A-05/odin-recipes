        <h1>Oreo Shake Recipe</h1>
        <img src="../images/oreoshake.webp" alt="Oreo Shake" width="300">
        <h3>Ingredients</h3>
        <ul>
            <li>6 chocolate sandwich cookies (such as Oreo)</li>
            <li>3 scoops vanilla ice cream</li>
            <li>¾ cup milk</li>
        </ul>
        <h3>Instructions</h3>
        <ol>
            <li>Blend chocolate sandwich cookies, ice cream, and milk together in a blender until smooth.</li>
            <li>Pour into 2 glasses.</li>
        </ol>
